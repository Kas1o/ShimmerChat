name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.0.0-alpha.1)'
        required: true

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Web 版：framework-dependent（无运行时）+ self-contained（带运行时，不裁剪）
  # ═══════════════════════════════════════════════════════════════
  web:
    strategy:
      fail-fast: false
      matrix:
        include:
          # framework-dependent：跨平台，用户需自备 .NET 运行时
          - os: ubuntu-latest
            label: web-fdd
            args: '--self-contained false'
          # self-contained linux-x64：带运行时，不裁剪未使用代码
          - os: ubuntu-latest
            label: web-scd-linux-x64
            args: '--self-contained true -r linux-x64'
          # self-contained win-x64
          - os: windows-latest
            label: web-scd-win-x64
            args: '--self-contained true -r win-x64'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine Version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish Web
        run: |
          dotnet publish ShimmerChat/ShimmerChat.csproj \
            -c Release \
            ${{ matrix.args }} \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o ./publish
        shell: bash

      - name: Zip
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $name = "ShimmerChat-$ver-${{ matrix.label }}"
          Compress-Archive -Path "publish/*" -DestinationPath "$name.zip" -CompressionLevel Optimal
          echo "ZIP_FILE=$name.zip" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ZIP_FILE }}

  # ═══════════════════════════════════════════════════════════════
  # Tauri 桌面版：Windows / macOS / Linux
  # ═══════════════════════════════════════════════════════════════
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            label: tauri-windows
            bundles: nsis
          - os: macos-latest
            rid: osx-arm64
            label: tauri-macos
            bundles: dmg
          - os: ubuntu-latest
            rid: linux-x64
            label: tauri-linux
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchutils \
            libssl-dev

      - name: Determine Version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Inject version into Tauri config
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          # tauri.conf.json
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $ver
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -NoNewline
          # Cargo.toml
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^version\s*=\s*".*"', "version = `"$ver`""
          Set-Content src-tauri/Cargo.toml $cargo -NoNewline
          Write-Host "Injected version: $ver"

      - name: Publish .NET sidecar
        run: |
          dotnet publish ShimmerChat/ShimmerChat.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -o src-tauri/binaries/shimmer-server
        shell: pwsh

      - name: Build Tauri
        run: npx --yes @tauri-apps/cli@^2 build --bundles ${{ matrix.bundles }}
        working-directory: src-tauri

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ═══════════════════════════════════════════════════════════════
  # 创建 GitHub Release，汇总所有产物
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [web, tauri]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          last_tag=$(git describe --tags --abbrev=0 --all HEAD^ 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            commits=$(git log --pretty=format:'- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))' HEAD)
          else
            commits=$(git log --pretty=format:'- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))' $last_tag..HEAD)
          fi
          {
            echo "changelog<<EOF"
            echo "$commits"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 下载说明

            | 文件 | 说明 |
            |------|------|
            | `web-fdd` | Web 版（无运行时，需自备 .NET 10） |
            | `web-scd-linux-x64` | Web 版（带运行时，Linux x64） |
            | `web-scd-win-x64` | Web 版（带运行时，Windows x64） |
            | `tauri-windows` | Tauri 桌面版（.exe NSIS 安装包） |
            | `tauri-macos` | Tauri 桌面版（.dmg，Apple Silicon） |
            | `tauri-linux` | Tauri 桌面版（.deb / .AppImage） |

            Automatically generated by GitHub Actions.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: false
          files: artifacts/*
